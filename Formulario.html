<!DOCTYPE html>
<head>
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario para completar</h1>
    <p>En el siguiente formulario, complete con su informacion Personal</p>
    <form>
        <input type="text" required minlength="3" placeholder="Username">
        <input type="email" required>
        <input type="password" required minlength="8">
        <input type="file">
        <input type="date" required>
        <input type="submit">
    </form>
</body>
</html>
